<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face stack</title>
    <style>
      :root {
        --bg: #000000;
        --ring: #1a1a1a;
        --white: #ffffff;
        --green: #00ff00;
        --font-family: monospace;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: var(--font-family);
      }

      .stacks {
        margin: 0;
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .stack-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-inline: 10px;
        background: var(--green);
        border-radius: 999px;
        width: fit-content;
      }

      .label {
        flex: 0 0 30px;
        text-align: left;
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .face-stack {
        display: flex;
        align-items: center;
        gap: 15px;
        min-width: 0;
        margin-block: -10px;
      }

      .faces {
        display: flex;
        align-items: center;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .faces li {
        margin: 0;
        position: relative;
      }

      .faces li:not(:first-child) {
        margin-left: -15px;
      }

      .face {
        display: block;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--ring);
        background: var(--ring);
        border: 1px solid white;
        box-shadow: -2px 0 5px black;
      }

      .more {
        margin: 0;
        font-size: 10px;
        font-weight: 500;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <ul class="stacks">
      <li class="stack-row">
        <p class="label">HTML</p>
        <div class="face-stack">
          <ul class="faces" aria-label="HTML contributors">
            <li><img class="face" src="https://i.pravatar.cc/96?img=12" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=32" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=5" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=9" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=47" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=68" /></li>
          </ul>
          <p class="more">+18 more</p>
        </div>
      </li>

      <li class="stack-row">
        <p class="label">CSS</p>
        <div class="face-stack">
          <ul class="faces" aria-label="CSS contributors">
            <li><img class="face" src="https://i.pravatar.cc/96?img=16" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=26" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=44" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=33" /></li>
          </ul>
          <p class="more">+12 more</p>
        </div>
      </li>

      <li class="stack-row">
        <p class="label">JS</p>
        <div class="face-stack">
          <ul class="faces" aria-label="JS contributors">
            <li><img class="face" src="https://i.pravatar.cc/96?img=51" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=59" /></li>
            <li><img class="face" src="https://i.pravatar.cc/96?img=14" /></li>
          </ul>
          <p class="more">+40 more</p>
        </div>
      </li>
    </ul>
  </body>
</html>
