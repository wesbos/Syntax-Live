<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form — CSS challenge</title>
    <style>
      :root {
        --black: #000000;
        --white: #ffffff;
        --gray-dark: #6b7280;
        --gray-light: #d1d5db;
        --violet: #ffc600;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 20px;
        background: var(--black);
        font-family: system-ui, sans-serif;
        color: var(--black);
        font-size: 15px;
      }

      .frame {
        width: 600px;
        height: 400px;
        margin: 0 auto;
        border: 1px solid red;
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      form {
        width: 400px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 25px;
        border: 1px solid var(--gray-light);
        border-radius: 10px;
        background: var(--white);
      }

      .headline {
        margin: 0;
        font-size: 25px;
        font-weight: 700;
        color: var(--black);
      }

      .title {
        margin: 0;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--gray-dark);
      }

      .input {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--gray-light);
        border-radius: 5px;
        font: inherit;
        color: var(--black);
        background: var(--white);
      }

      .input::placeholder,
      .digit::placeholder {
        color: var(--gray-dark);
      }

      .input.focus {
        outline: 2px solid var(--violet);
        border-color: var(--violet);
        background: var(--white);
      }

      .otp {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .join {
        flex: 1 1 10px;
        height: 2px;
        min-width: 5px;
        max-width: 20px;
        background: var(--gray-light);
      }

      .join.done {
        background: var(--violet);
      }

      .digit {
        width: 45px;
        height: 45px;
        padding: 0;
        border: 1px solid var(--gray-light);
        border-radius: 10px;
        font-family: ui-monospace, monospace;
        font-size: 20px;
        text-align: center;
        color: var(--black);
        background: var(--white);
      }

      .digit::placeholder {
        font-size: 25px;
      }

      .submit {
        margin-top: 10px;
        width: 100%;
        padding: 10px 15px;
        border: 0;
        border-radius: 5px;
        font: inherit;
        font-weight: 700;
        color: var(--white);
        background: var(--violet);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <form class="card" action="#" method="post">
        <h1 class="headline">Verify &amp; continue</h1>

        <label class="title" for="email">Email</label>
        <input
          class="input"
          id="email"
          name="email"
          type="email"
          value="hello@syntax.fm"
        />

        <label class="title" for="company">Company</label>
        <input
          class="input focus"
          id="company"
          name="company"
          type="text"
          placeholder="Your team or org name"
        />

        <span class="title">One-time code</span>
        <div class="otp">
          <input
            class="digit"
            name="otp1"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="1"
            value="8"
          />
          <span class="join done"></span>
          <input
            class="digit"
            name="otp2"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="1"
            value="4"
          />
          <span class="join"></span>
          <input
            class="digit"
            name="otp3"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="1"
            placeholder="·"
          />
          <span class="join"></span>
          <input
            class="digit"
            name="otp4"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="1"
            placeholder="·"
          />
        </div>

        <label class="title" for="password">Password</label>
        <input
          class="input"
          id="password"
          name="password"
          type="password"
          placeholder="Minimum 10 characters"
        />

        <button class="submit" type="submit">Continue</button>
      </form>
    </div>
  </body>
</html>
